<table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color:#f4f5f7;padding:32px 16px;">
  <tr>
    <td align="center">
      <table width="480" border="0" cellspacing="0" cellpadding="0" style="max-width:480px;width:100%;">

        <!-- Logo 標頭（深色品牌底） -->
        <tr>
          <td align="center" style="background-color:#0b0f14;border-radius:16px 16px 0 0;padding:28px 24px;">
            <img src="{{ .SiteURL }}/email-logo.png" alt="Tri·log" width="195" style="display:block;width:195px;height:auto;" />
          </td>
        </tr>

        <!-- 內文卡片 -->
        <tr>
          <td style="background-color:#ffffff;border-radius:0 0 16px 16px;padding:36px 32px;font-family:Arial,'Helvetica Neue','PingFang TC','Microsoft JhengHei',sans-serif;">

            <h1 style="margin:0 0 16px;font-size:20px;line-height:1.4;color:#1a202c;font-weight:700;">
              歡迎加入 Tri·log！
            </h1>

            <p style="margin:0 0 12px;font-size:15px;line-height:1.7;color:#4a5568;">
              感謝你註冊 Tri·log — 鐵人三項成績記錄與排行榜平台。
            </p>
            <p style="margin:0 0 28px;font-size:15px;line-height:1.7;color:#4a5568;">
              請點擊下方按鈕完成 Email 驗證，啟用你的帳號：
            </p>

            <!-- CTA 按鈕 -->
            <table border="0" cellspacing="0" cellpadding="0" align="center" style="margin:0 auto 28px;">
              <tr>
                <td align="center" style="background-color:#66c6be;border-radius:10px;">
                  <a href="{{ .ConfirmationURL }}"
                     style="display:inline-block;padding:14px 40px;font-size:16px;font-weight:700;color:#0b0f14;text-decoration:none;font-family:Arial,sans-serif;">
                    驗證我的帳號
                  </a>
                </td>
              </tr>
            </table>

            <p style="margin:0 0 8px;font-size:13px;line-height:1.6;color:#a0aec0;">
              如果按鈕無法點擊，請複製以下連結到瀏覽器開啟：
            </p>
            <p style="margin:0 0 24px;font-size:12px;line-height:1.6;word-break:break-all;">
              <a href="{{ .ConfirmationURL }}" style="color:#66c6be;text-decoration:underline;">{{ .ConfirmationURL }}</a>
            </p>

            <hr style="border:none;border-top:1px solid #e2e8f0;margin:0 0 16px;" />

            <p style="margin:0;font-size:12px;line-height:1.6;color:#a0aec0;">
              如果你沒有註冊 Tri·log，請忽略這封信，你的 Email 不會被使用。<br />
              此為系統自動發送的信件，請勿直接回覆。
            </p>

          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td align="center" style="padding:20px 24px;font-family:Arial,sans-serif;">
            <p style="margin:0;font-size:12px;color:#a0aec0;">
              Tri·log — Swim · Bike · Run，記錄你的每一場鐵人賽
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
