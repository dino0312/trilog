name: Keep Supabase Alive

# Supabase Free 方案：連續 7 天無請求會自動暫停
# 每週一早上 9:00 UTC（台灣時間 17:00）打一次 health endpoint 保持活躍
# 參考：docs/decisions.md ADR-019

on:
  schedule:
    - cron: '0 9 * * 1'  # 每週一 09:00 UTC
  workflow_dispatch:      # 支援手動觸發（測試用）

jobs:
  ping:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.APP_URL }}/api/health)
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Supabase is alive ✓"
